// Fund summary (computed from loans)
const FUND_SUMMARIES = (() => {
  const out = {};
  for (const fund of ["CMI","INCREF","CMI/INCREF","INREIT"]) {
    const ls = INVESCO_DATA.loans.filter(l => l.fund === fund);
    if (!ls.length) continue;
    out[fund] = {
      loans: ls.length,
      balance: ls.reduce((s,l)=>s+(l.currentBalance||0),0),
      avgLTV:  ls.reduce((s,l)=>s+(l.currentLTV||0),0) / ls.length,
      watchlist: ls.filter(l => l.watchlist === "Internal" || l.watchlist === "External").length,
      properties: ls.reduce((s,l)=>s+(l.numProperties||0),0),
    };
  }
  return out;
})();

// Resolve approver: "first slot before /" with Ariel Cole fallback (per flow doc)
const resolveApprover = (amTeam) => {
  if (!amTeam) return { resolved: "Ariel Cole", isFallback: true, raw: null };
  const first = amTeam.split("/")[0].trim();
  if (!first) return { resolved: "Ariel Cole", isFallback: true, raw: amTeam };
  return { resolved: first, isFallback: false, raw: amTeam };
};

// Threshold focus points — flag loans whose key metrics dropped through these levels QoQ
const FOCUS_THRESHOLDS = {
  dscr:      { level:1.20, dir:"down", label:"DSCR below 1.20x",   curKey:"currentDSCR",      priorKey:"priorDSCR",      fmt:"mult" },
  ltv:       { level:80,   dir:"up",   label:"LTV above 80%",       curKey:"currentLTV",       priorKey:"priorLTV",       fmt:"pct"  },
  dy:        { level:7.0,  dir:"down", label:"Debt Yield below 7%", curKey:"currentDY",        priorKey:"priorDY",        fmt:"pct"  },
  occupancy: { level:90,   dir:"down", label:"Occupancy below 90%", curKey:"occupancyCurrent", priorKey:"priorOcc",       fmt:"pct"  },
};

const computeBreaches = (loan) => {
  const breaches = [];
  for (const [key, t] of Object.entries(FOCUS_THRESHOLDS)) {
    const cur = loan[t.curKey], prior = loan[t.priorKey];
    if (cur == null || prior == null) continue;
    let crossed = false;
    if (t.dir === "down") crossed = (prior >= t.level && cur < t.level);
    if (t.dir === "up")   crossed = (prior <= t.level && cur > t.level);
    if (crossed) breaches.push({ key, label: t.label, prior, cur, fmt: t.fmt, threshold: t.level });
  }
  return breaches;
};

const fmtMetric = (val, kind) => {
  if (val == null) return "—";
  if (kind === "mult") return Number(val).toFixed(2) + "x";
  if (kind === "pct")  return Number(val).toFixed(1) + "%";
  return String(val);
};

const fiveBusinessDays = () => {
  const d = new Date(); let added = 0;
  while (added < 5) { d.setDate(d.getDate()+1); const dow=d.getDay(); if(dow!==0 && dow!==6) added++; }
  return d;
};

function EditableField({ value, type, options, editing, onChange, placeholder }) {
  if (!editing) return <span>{value == null || value === "" ? <span style={{ color:"#bbb" }}>—</span> : value}</span>;

// SLA countdown chip
function SlaChip({ slaDueAt }) {
  if (!slaDueAt) return null;
  const due = new Date(slaDueAt);
  const now = new Date();
  const ms = due - now;
  const hours = Math.floor(ms / (1000*60*60));
  const days = Math.floor(hours / 24);
  let label, color;
  if (ms < 0) { label = `Overdue ${Math.abs(days)||""}d`; color = "#DC2626"; }
  else if (days >= 2) { label = `${days}d ${hours%24}h`; color = "#059669"; }
  else if (days >= 1) { label = `${days}d ${hours%24}h`; color = "#D97706"; }
  else { label = `${hours}h left`; color = "#DC2626"; }
  return <span style={{ background:color, color:"#fff", padding:"2px 8px", borderRadius:4, fontSize:10, fontWeight:700, whiteSpace:"nowrap" }}>SLA {label}</span>;
}

          <div className="section-title">Onboarding Submission</div>
          <div className="grid2">
            <div>
              <FieldRow label="Loan Name">{item.loanName}</FieldRow>
              <FieldRow label="Record Type / Fund">{item.onboarding.recordType}</FieldRow>
              <FieldRow label="Cycle Date">{item.onboarding.cycleDate}</FieldRow>
              <FieldRow label="Balance">{fmt.usdFull(item.onboarding.balance)}</FieldRow>
            </div>
            <div>
              <FieldRow label="Property Type">{item.onboarding.propertyType}</FieldRow>
              <FieldRow label="Sponsor">{item.onboarding.sponsor}</FieldRow>
              <FieldRow label="Originator">{item.onboarding.originator}</FieldRow>
              {item.onboarding.cmiOwnership != null && <FieldRow label="CMI / INCREF Split">{item.onboarding.cmiOwnership}% / {item.onboarding.increfOwnership}%</FieldRow>}
            </div>
          </div>
        </div>
      )}

      {item.status==="pending" && (
        <div className="section-card" style={{ marginBottom:16 }}>
          <div className="section-title">5-Business-Day SLA</div>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <SlaChip slaDueAt={item.slaDueAt} />
            <span style={{ fontSize:11, color:"#64748B" }}>Due {fmt.date(item.slaDueAt)} · per Onboarding flow email template "Please approve within 5 BD of receipt"</span>
          </div>
        </div>
      )}

      {item.status === "pending" && canApprove && (
        <div style={{ display:"flex", gap:10, padding:"14px 0", borderTop:"1px solid #E2E8F0" }}>
          <button onClick={onApprove} style={{ background:"#28A745", color:"#fff", border:"none", borderRadius:6, padding:"10px 24px", fontSize:13, fontWeight:700, cursor:"pointer" }}>✓ Approve</button>
          {!showReject && <button onClick={()=>setShowReject(true)} style={{ background:"#fff", color:"#C62828", border:"1px solid #F8D7DA", borderRadius:6, padding:"10px 22px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Reject…</button>}
          {showReject && (
            <div style={{ flex:1, display:"flex", gap:6 }}>
              <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="Rejection reason…" style={{ flex:1, border:"1px solid #ddd", borderRadius:6, padding:"8px 12px", fontSize:12 }} />
              <button onClick={()=>onReject(reason||"Rejected")} style={{ background:"#DC2626", color:"#fff", border:"none", borderRadius:6, padding:"8px 18px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Confirm</button>
            </div>
          )}
        </div>
      )}
      {item.status === "pending" && !canApprove && (
        <div style={{ padding:"14px 0", borderTop:"1px solid #E2E8F0", color:"#94A3B8", fontSize:12 }}>
          You ({role}) cannot approve this. Awaiting <strong>{item.approver}</strong>.
        </div>
      )}
      {item.status !== "pending" && (
        <div style={{ padding:"14px 16px", background:"#F8FAFC", borderRadius:8, border:"1px solid #E2E8F0", marginTop:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
            <StatusBadge status={item.status} />
            {item.decidedBy && <span style={{ fontSize:11, color:"#64748B" }}>by <strong>{item.decidedBy}</strong> · {item.decidedAt}</span>}
          </div>
          {item.rejectReason && <div style={{ fontSize:11, color:"#991B1B", marginTop:4 }}>Reason: {item.rejectReason}</div>}
        </div>
      )}
    </div>
  );
}

// PORTFOLIO LANDING (L1)

function PortfolioLanding({ loans, onSelectLoan, role, approvals, currentUserName, setApprovals, onOpenApprovals, onOpenNewLoan }) {
  const [fundFilter, setFundFilter]   = useState("All Funds");
  const [typeFilter, setTypeFilter]   = useState("All");
  const [wlOnly,     setWlOnly]       = useState(false);
  const [loanFilter,    setLoanFilter]    = useState("");
  const [sponsorFilter, setSponsorFilter] = useState("");
  const [focusOnly,  setFocusOnly]    = useState(false);
  const [sortKey,    setSortKey]      = useState("currentBalance");
  const [sortDir,    setSortDir]      = useState("desc");

  const filtered = useMemo(() => {
    let r = loans;
    if (fundFilter !== "All Funds") r = r.filter(l => l.fund === fundFilter);
    if (typeFilter !== "All")       r = r.filter(l => (l.propertyType||"").includes(typeFilter));
    if (wlOnly)                     r = r.filter(l => l.watchlist === "Internal" || l.watchlist === "External");
    if (focusOnly)                  r = r.filter(l => computeBreaches(l).length > 0);
    if (loanFilter)                 r = r.filter(l => l.name === loanFilter);
    if (sponsorFilter)              r = r.filter(l => l.principalSponsor === sponsorFilter);
    const dir = sortDir === "desc" ? -1 : 1;
    r = [...r].sort((a,b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === "number") return (av - bv) * dir;
      return String(av).localeCompare(String(bv)) * dir;
    });
    return r;
  }, [loans, fundFilter, typeFilter, wlOnly, focusOnly, loanFilter, sponsorFilter, sortKey, sortDir]);

  const totals = useMemo(() => ({
    balance: filtered.reduce((s,l)=>s+(l.currentBalance||0),0),
    avgLTV:  filtered.length ? filtered.reduce((s,l)=>s+(l.currentLTV||0),0) / filtered.length : 0,
    watchlist: filtered.filter(l => l.watchlist === "Internal" || l.watchlist === "External").length,
    properties: filtered.reduce((s,l)=>s+(l.numProperties||0),0),
    focusCount: filtered.filter(l => computeBreaches(l).length > 0).length,
  }), [filtered]);

  const pendingByLoan = useMemo(() => {
    const m = {};
    for (const a of approvals) {
      if (a.status === "pending") m[a.loanName] = (m[a.loanName] || 0) + 1;
    }
    return m;
  }, [approvals]);

  const sortClick = (k) => { if (sortKey === k) setSortDir(d => d==="desc"?"asc":"desc"); else { setSortKey(k); setSortDir("desc"); } };
  const sortArr = (k) => sortKey === k ? (sortDir === "desc" ? "▼" : "▲") : "";

  const fundColors = { CMI:"#0E7490", INCREF:"#7C3AED", "CMI/INCREF":"#0F766E", INREIT:"#B45309" };

  return (
    <div style={{ padding:20 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:14 }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:700, color:"#1B2A4A", letterSpacing:-0.3 }}>Loan Portfolio</h1>
          <div style={{ fontSize:11, color:"#94A3B8", marginTop:4 }}>{loans.length} loans across CMI · INCREF · CMI/INCREF · INREIT</div>
        </div>
        <button onClick={onOpenNewLoan} title="∑ Sigma: Open New Invesco Loan Screen Flow · 3-step modal · Insert silver_invesco_loan + submit to Invesco_Loan_Approval_Process" style={{ background:"#28A745", color:"#fff", border:"none", borderRadius:6, padding:"9px 20px", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:8, boxShadow:"0 2px 6px rgba(40,167,69,0.25)" }}>
          + New Loan
        </button>
      </div>

      {(() => {
        const myPending = approvals.filter(a => a.status === "pending" && (role === "admin" || (role === "deallead" && a.approver === currentUserName)));
        if (myPending.length === 0) return null;
        return (
          <div style={{ background:"linear-gradient(90deg, #FEF3C7, #FFFBEB)", border:"1px solid #F59E0B", borderLeft:"4px solid #D97706", borderRadius:8, padding:"14px 18px", display:"flex", alignItems:"center", gap:14, marginBottom:14, flexWrap:"wrap" }}>
            <span style={{ fontSize:22 }}>⏳</span>
            <div style={{ flex:1, minWidth:240 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#92400E" }}>
                Your approval queue — {myPending.length} item{myPending.length>1?"s":""} pending
              </div>
              <div style={{ fontSize:11, color:"#A16207", marginTop:2 }}>
                {[...new Set(myPending.map(p => p.loanName))].slice(0,5).join(" · ")}{[...new Set(myPending.map(p => p.loanName))].length > 5 ? " · …" : ""}
              </div>
            </div>
            <button onClick={onOpenApprovals} title="∑ Sigma: Open silver_approvals queue · Filtered to approver_user = current user" style={{ background:"#D97706", color:"#fff", border:"none", borderRadius:6, padding:"8px 18px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
              Open Approvals Queue
            </button>
          </div>
        );
      })()}

      <div style={{ display:"flex", gap:12, marginBottom:14 }}>
        <KPICard label="Loans" value={filtered.length} sub={"of " + loans.length + " total"} />
        <KPICard label="Aggregate Balance" value={fmt.usd(totals.balance)} sub="Whole loan rollup" />
        <KPICard label="Properties" value={Math.round(totals.properties)} />
        <KPICard label="Avg LTV" value={fmt.pct(totals.avgLTV)} alert={totals.avgLTV > 75} />
        <KPICard label="Status: Flagged" value={totals.watchlist} alert={totals.watchlist > 0} color={totals.watchlist > 0 ? "#E67E22" : undefined} />
        <KPICard label="Focus Points" value={totals.focusCount} alert={totals.focusCount > 0} color={totals.focusCount > 0 ? "#DC2626" : undefined} hint="Loans with at least one metric that dropped through a threshold this quarter (DSCR<1.20x, LTV>80%, DY<7%, Occupancy<90%)." />
      </div>

      {fundFilter === "All Funds" && (
        <div style={{ display:"flex", gap:12, marginBottom:14 }}>
          {Object.entries(FUND_SUMMARIES).map(([fund, s]) => (
            <div key={fund} onClick={() => setFundFilter(fund)} style={{ flex:1, background:"#fff", borderRadius:8, padding:"14px 16px", border:"1px solid #e9ecef", cursor:"pointer", borderLeft:"4px solid " + (fundColors[fund] || "#475569") }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <FundChip fund={fund} />
                <span style={{ fontSize:11, color:"#94A3B8" }}>{s.loans} loan{s.loans!==1?"s":""}</span>
              </div>
              <div style={{ fontSize:18, fontWeight:700, color:"#1B2A4A" }}>{fmt.usd(s.balance)}</div>
              <div style={{ fontSize:11, color:"#64748B", marginTop:4 }}>
                LTV {fmt.pct(s.avgLTV)} · {Math.round(s.properties)} props
                {s.watchlist > 0 && <span style={{ color:"#E67E22", fontWeight:600 }}> · {s.watchlist} WL</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="section-card" style={{ marginBottom:14, padding:"12px 16px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
          <select value={loanFilter} onChange={e=>setLoanFilter(e.target.value)} style={{ flex:"1 1 200px", border:"1px solid #ddd", borderRadius:6, padding:"7px 12px", fontSize:12, background:"#fff", color: loanFilter ? "#1B2A4A" : "#94A3B8" }}>
            <option value="">All loans</option>
            {[...new Set(loans.map(l => l.name))].sort().map(n => <option key={n} value={n}>{n}</option>)}
          </select>
          <select value={sponsorFilter} onChange={e=>setSponsorFilter(e.target.value)} style={{ flex:"1 1 200px", border:"1px solid #ddd", borderRadius:6, padding:"7px 12px", fontSize:12, background:"#fff", color: sponsorFilter ? "#1B2A4A" : "#94A3B8" }}>
            <option value="">All sponsors</option>
            {[...new Set(loans.map(l => l.principalSponsor).filter(Boolean))].sort().map(n => <option key={n} value={n}>{n}</option>)}
          </select>
          <select value={fundFilter} onChange={e=>setFundFilter(e.target.value)} style={{ border:"1px solid #ddd", borderRadius:6, padding:"7px 12px", fontSize:12, background:"#fff" }}>
            {FUND_LIST.map(f => <option key={f}>{f}</option>)}
          </select>
          <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{ border:"1px solid #ddd", borderRadius:6, padding:"7px 12px", fontSize:12, background:"#fff" }}>
            {PROPERTY_TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
          <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"#475569", cursor:"pointer" }}>
            <input type="checkbox" checked={wlOnly} onChange={e=>setWlOnly(e.target.checked)} />
            Status: flagged only
          </label>
          <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"#DC2626", cursor:"pointer", fontWeight: focusOnly?700:500 }}>
            <input type="checkbox" checked={focusOnly} onChange={e=>setFocusOnly(e.target.checked)} />
            ⚠ Focus points only
          </label>
        </div>
      </div>

      <div className="section-card" style={{ padding:0, overflow:"hidden" }}>
        <table className="tbl">
          <thead>
            <tr>
              <th onClick={()=>sortClick("name")}>Loan {sortArr("name")}</th>
              <th onClick={()=>sortClick("fund")}>Fund {sortArr("fund")}</th>
              <th onClick={()=>sortClick("propertyType")}>Type {sortArr("propertyType")}</th>
              <th>Sponsor</th>
              <th onClick={()=>sortClick("currentBalance")} style={{ textAlign:"right" }}>Balance {sortArr("currentBalance")}</th>
              <th onClick={()=>sortClick("currentLTV")} style={{ textAlign:"right" }}>LTV {sortArr("currentLTV")}</th>
              <th onClick={()=>sortClick("currentMaturity")}>Maturity {sortArr("currentMaturity")}</th>
              <th>Status</th>
              <th>Score</th>
              <th>AM Team</th>
              <th>Focus</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(l => (
              <tr key={l.id} className="clickable" onClick={()=>onSelectLoan(l)}>
                <td>
                  <div style={{ fontWeight:700, color:"#1B2A4A" }}>{l.name}</div>
                  <div style={{ fontSize:10, color:"#94A3B8", fontFamily:"monospace" }}>{l.id}</div>

                <td><FundChip fund={l.fund} /></td>

                <td style={{ textAlign:"right", fontWeight:700, color:"#1B2A4A" }}>{fmt.usd(l.currentBalance)}</td>
                <td style={{ textAlign:"right", color: l.currentLTV > 80 ? "#DC2626" : l.currentLTV > 70 ? "#D97706" : "#059669", fontWeight:600 }}>{fmt.pct(l.currentLTV)}</td>
                <td style={{ fontSize:11, color:"#475569" }}>{fmt.date(l.currentMaturity)}</td>
                <td><WatchlistChip value={l.watchlist} /></td>
                <td><ScoreDot score={l.overallScore} /></td>
                <td style={{ fontSize:10, color:"#64748B" }}>{l.amTeam || "—"}</td>
                <td>{(() => { const br = computeBreaches(l); return br.length > 0 ? (
                  <span title={"Focus point: " + br.map(b => b.label).join("; ")} style={{ background:"#FEE2E2", color:"#991B1B", padding:"2px 6px", borderRadius:4, fontSize:9, fontWeight:700, whiteSpace:"nowrap" }}>
                    ⚠ {br.length}
                  </span>
                ) : null; })()}</td>
                <td>{pendingByLoan[l.name] && (
                  <span title={pendingByLoan[l.name] + " pending approval(s)"} style={{ background:"#FFF3CD", color:"#856404", padding:"2px 6px", borderRadius:4, fontSize:9, fontWeight:700 }}>
                    {pendingByLoan[l.name]} ⏳
                  </span>
                )}</td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={12} style={{ padding:36, textAlign:"center", color:"#94A3B8", fontSize:12 }}>No loans match the current filters.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

              </div>
            </div>
          )}
        </div>

        <div style={{ padding:"12px 22px", borderTop:"1px solid #e9ecef", background:"#F8FAFC", display:"flex", justifyContent:"space-between", alignItems:"center", borderRadius:"0 0 10px 10px" }}>

            <button onClick={onClose} style={{ background:"#f8f9fa", border:"1px solid #ddd", borderRadius:6, padding:"8px 18px", cursor:"pointer", fontSize:12 }}>Cancel</button>

            )}

              <button onClick={()=>setStep(2)} disabled={!recordType} style={{ background: recordType?"#28A745":"#CBD5E1", color:"#fff", border:"none", borderRadius:6, padding:"8px 22px", cursor: recordType?"pointer":"not-allowed", fontSize:12, fontWeight:700 }}>Next →</button>
            )}

            )}
            {step === 3 && (
              <button onClick={submit} title="∑ Sigma: Insert silver_invesco_loan row + submit to Invesco_Loan_Approval_Process · Email approver" style={{ background:"#28A745", color:"#fff", border:"none", borderRadius:6, padding:"8px 24px", cursor:"pointer", fontSize:12, fontWeight:700 }}>✓ Confirm & Create</button>

    </div>

function LoanSummaryTab({ loan, addApproval, role, currentUserName }) {
  const [editing, setEditing] = useState(false);
  const [edits, setEdits]     = useState({});
  const [toast, setToast]     = useState(null);

  const get = (k) => edits[k] !== undefined ? edits[k] : loan[k];
  const set = (k, v) => setEdits(prev => ({...prev, [k]: v}));
  const cancel = () => { setEdits({}); setEditing(false); };
  const save = () => {
    // Build change-log of fields that differ from original
    const PRIMARY = {
      stage:"Stage", currentMaturity:"Current Maturity", initialMaturity:"Initial Maturity",
      currentRate:"All-In Rate", currentValue:"Current Value", stabValue:"Stabilized Value",
      currentDSCR:"Current DSCR", watchlist:"Invesco Status",
    };
    const changes = [];
    for (const k of Object.keys(edits)) {
      if (edits[k] !== loan[k] && edits[k] !== "" && PRIMARY[k]) {
        const fmt = v => (k === "currentValue" || k === "stabValue") ? fmt2usd(v) :
                          (k === "currentRate") ? Number(v).toFixed(2) + "%" :
                          (k === "currentDSCR") ? Number(v).toFixed(2) + "x" :
                          String(v);
        const fmt2usd = v => v >= 1e6 ? "$" + (v/1e6).toFixed(1) + "M" : "$" + Number(v).toLocaleString();
        changes.push({ field: k, label: PRIMARY[k], oldVal: fmt(loan[k]), newVal: fmt(edits[k]) });
      }
    }
    if (changes.length === 0) {
      setToast({ type:"warn", msg:"No primary fields changed — nothing to submit" });
      cancel();
      return;
    }
    addApproval({ subType:"Field Change", loanName: loan.name, fund: loan.fund, amTeam: loan.amTeam, changes });
    setToast({ type:"ok", msg: changes.length + " field change" + (changes.length>1?"s":"") + " submitted to " + resolveApprover(loan.amTeam).resolved });
    cancel();
    setTimeout(()=>setToast(null), 4500);

function LoanCapStackTab({ loan, addApproval }) {
  const [editIdx, setEditIdx] = useState(null);
  const [posFilter, setPosFilter] = useState("");

  // Build positions
  const benchmarkLabel = loan.rateType === "Floating" ? (loan.benchmark ? "SOFR" : "SOFR") : (loan.rateType === "Fixed" ? "Fixed" : "—");
  const sponsorName = loan.principalSponsor || "—";
  const allInPct    = loan.currentRate;
  const benchmarkNum = parseFloat(loan.benchmark) || null;
  const spread      = (allInPct && benchmarkNum) ? Math.max(0, allInPct - benchmarkNum) : null;

  const positions = [];

  if (loan.currentBalanceNoteA) {
    positions.push({
      pos: "Senior",
      sponsorName,
      lender: loan.seniorLender || loan.seniorLender1 || "—",
      benchmark: benchmarkLabel,
      spread: spread,
      allInRate: allInPct,
      initFunding: loan.currentBalanceNoteA,
      currentBalance: loan.currentBalanceNoteA,
      futureFunding: null,
      totalCMT: loan.currentBalanceNoteA,
      ffLtc: null,
      currLtv: null,
    });
  }
  if (loan.currentBalanceNoteB) {
    positions.push({
      pos: "Senior — B",
      sponsorName,
      lender: loan.seniorLender2 || "—",
      benchmark: benchmarkLabel,
      spread: spread,
      allInRate: allInPct,
      initFunding: loan.currentBalanceNoteB,
      currentBalance: loan.currentBalanceNoteB,
      futureFunding: null,
      totalCMT: loan.currentBalanceNoteB,
      ffLtc: null,
      currLtv: null,
    });
  }
  if (loan.currentBalanceSubord) {
    positions.push({
      pos: "Mezz",
      sponsorName,
      lender: "Subordinate Lender",
      benchmark: benchmarkLabel,
      spread: spread ? spread + 2 : null,
      allInRate: allInPct ? allInPct + 2 : null,
      initFunding: loan.currentBalanceSubord * 0.55,
      currentBalance: loan.currentBalanceSubord,
      futureFunding: loan.currentBalanceSubord * 0.05,
      totalCMT: loan.currentBalanceSubord * 1.05,
      ffLtc: null,
      currLtv: null,
    });
  }
  if (!positions.length && loan.currentBalance) {
    positions.push({ pos:"Senior", sponsorName, lender: loan.seniorLender || "—", benchmark: benchmarkLabel, spread, allInRate: allInPct, initFunding: loan.currentBalance, currentBalance: loan.currentBalance, futureFunding: null, totalCMT: loan.currentBalance, ffLtc: null, currLtv: null });
  }

  // Sponsor equity row
  const totalDebt = positions.reduce((s,p) => s + (p.currentBalance || 0), 0);
  const sponsorEquity = Math.max(0, (loan.currentValue || 0) - totalDebt);
  if (sponsorEquity > 0) {
    positions.push({
      pos: "Sponsor",
      sponsorName,
      lender: loan.principalSponsor || "—",
      benchmark: "—",
      spread: null,
      allInRate: null,
      initFunding: sponsorEquity,
      currentBalance: sponsorEquity,
      futureFunding: null,
      totalCMT: sponsorEquity,
      ffLtc: null,
      currLtv: null,
    });
  }

  const positionOptions = [...new Set(positions.map(p => p.pos))];
  const filteredPositions = posFilter ? positions.filter(p => p.pos === posFilter) : positions;

  // Compute LTVs per position (cumulative for debt; full for sponsor)
  const value = loan.currentValue || 0;
  let cum = 0;
  filteredPositions.forEach(p => {
    if (p.pos === "Sponsor") {
      p.currLtv = null; // no LTV on equity
      p.ffLtc   = null;
    } else {
      cum += p.currentBalance || 0;
      p.currLtv = value ? cum / value : null;
      p.ffLtc   = value ? (cum + (p.futureFunding || 0)) / value : null;
    }
  });

  const sumInit = filteredPositions.reduce((s,p) => s + (p.initFunding || 0), 0);
  const sumCurr = filteredPositions.reduce((s,p) => s + (p.currentBalance || 0), 0);
  const sumCMT  = filteredPositions.reduce((s,p) => s + (p.totalCMT || 0), 0);
  const sumFF   = filteredPositions.reduce((s,p) => s + (p.futureFunding || 0), 0);
  const fullyFundedLTC = value ? sumCMT / value : null;

  // OCM Exposure rows — fund participation
  const ocmRows = [];
  if (loan.fund === "CMI/INCREF") {
    ocmRows.push({ fund:"CMI",    pct: 0.60, init: sumInit*0.60, curr: sumCurr*0.60, cmt: sumCMT*0.60 });
    ocmRows.push({ fund:"INCREF", pct: 0.40, init: sumInit*0.40, curr: sumCurr*0.40, cmt: sumCMT*0.40 });
  } else {
    ocmRows.push({ fund: loan.fund, pct: 1.00, init: sumInit, curr: sumCurr, cmt: sumCMT });
  }
  const ocmTotalPct = ocmRows.reduce((s,r) => s + r.pct, 0) / ocmRows.length;

  // Appraised LTV Summary — As-Is, Stabilized, Original
  const ltvScenarios = [];
  if (value) ltvScenarios.push({ scenario:"As-Is", val: value, currLtv: loan.currentLTV/100, ffLtc: fullyFundedLTC });
  if (loan.stabValue) ltvScenarios.push({ scenario:"Stabilized", val: loan.stabValue, currLtv: loan.stabLTV/100, ffLtc: value ? sumCMT / loan.stabValue : null });
  if (loan.origValue) ltvScenarios.push({ scenario:"Original", val: loan.origValue, currLtv: loan.origLTV/100, ffLtc: null });

  // Senior lender split (kept from original)
  const seniorLenders = [];
  for (let i = 1; i <= 5; i++) {
    const name = loan["seniorLender"+i];
    const pct  = loan["seniorPct"+i];
    if (name && pct) seniorLenders.push({ name, pct });
  }

  // Helpers
  const navyHead = { background:"#1B2A4A", color:"#fff", padding:"9px 12px", fontSize:11, fontWeight:600, textAlign:"left", whiteSpace:"nowrap", letterSpacing:0.2 };
  const cell     = { padding:"8px 12px", fontSize:12, color:"#1B2A4A", borderBottom:"1px solid #F1F5F9" };
  const cellRt   = { ...cell, textAlign:"right", fontVariantNumeric:"tabular-nums" };
  const dash     = <span style={{ color:"#94A3B8" }}>-</span>;
  const fmtUsdM  = v => v == null ? dash : (v >= 1e9 ? "$" + (v/1e9).toFixed(4) + "B" : v >= 1e6 ? "$" + (v/1e6).toFixed(3) + "M" : "$" + (v/1e3).toFixed(0) + "K");
  const fmtPctV  = v => v == null ? dash : (v*100).toFixed(2) + "%";
  const fmtRate  = v => v == null ? dash : Number(v).toFixed(2);

  return (
    <div>
      {/* Header strip with title + Position filter (top right) */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:14, padding:"4px 4px" }}>
        <h2 style={{ fontSize:24, fontWeight:600, color:"#475569", letterSpacing:-0.3 }}>Capital Stack</h2>
        <div>
          <div style={{ fontSize:11, color:"#475569", marginBottom:4, fontWeight:500 }}>Position</div>
          <select value={posFilter} onChange={e=>setPosFilter(e.target.value)} style={{ minWidth:200, border:"1px solid #CBD5E1", borderRadius:4, padding:"6px 10px", fontSize:12, background:"#fff", color: posFilter ? "#1B2A4A" : "#94A3B8" }}>
            <option value="">Select values</option>
            {positionOptions.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
        </div>
      </div>

      {/* Main capital stack table */}
      <div style={{ background:"#fff", borderRadius:6, overflow:"hidden", border:"1px solid #E2E8F0", marginBottom:0 }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr>
              <th style={{...navyHead, width:80}}>Action <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={navyHead}>Position <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={navyHead}>Sponsor Name <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={navyHead}>Benchmark <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>Spread <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>All in Rate <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>Init. Funding <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>Curr. Balance <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>Future Funding <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>Total CMT <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>FF LTC <span style={{ opacity:0.5 }}>⌄</span></th>
              <th style={{...navyHead, textAlign:"right"}}>Curr. LTV <span style={{ opacity:0.5 }}>⌄</span></th>
            </tr>
          </thead>
          <tbody>
            {filteredPositions.map((p,i) => (
              <tr key={i} style={{ background: i%2 ? "#F8FAFC" : "#fff" }}>
                <td style={cell}>
                  <button title="∑ Sigma: Edit position row on silver_invesco_loan_capital_stack — Update Row Action · Approval required" onClick={()=>setEditIdx(positions.indexOf(p))} style={{ background:"transparent", border:"none", color:"#2E75B6", fontSize:12, cursor:"pointer", padding:0, textDecoration:"underline" }}>Edit</button>
                </td>
                <td style={cell}>{p.pos}</td>
                <td style={cell}>{p.sponsorName}</td>
                <td style={cell}>{p.benchmark}</td>
                <td style={cellRt}>{fmtRate(p.spread)}</td>
                <td style={cellRt}>{fmtRate(p.allInRate)}</td>
                <td style={cellRt}>{fmtUsdM(p.initFunding)}</td>
                <td style={cellRt}>{fmtUsdM(p.currentBalance)}</td>
                <td style={cellRt}>{fmtUsdM(p.futureFunding)}</td>
                <td style={cellRt}>{fmtUsdM(p.totalCMT)}</td>
                <td style={cellRt}>{fmtPctV(p.ffLtc)}</td>
                <td style={cellRt}>{fmtPctV(p.currLtv)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* SUMMARY footer */}
      <div style={{ background:"#F8FAFC", border:"1px solid #E2E8F0", borderTop:"none", padding:"14px 18px", display:"flex", alignItems:"center", gap:36, marginBottom:24 }}>
        <div style={{ minWidth:160 }}>
          <div style={{ fontSize:11, color:"#475569", textTransform:"uppercase", letterSpacing:0.5, fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>SUMMARY <span style={{ opacity:0.5 }}>⌄</span></div>
          <div style={{ fontSize:11, color:"#94A3B8", marginTop:3 }}>{filteredPositions.length} rows – 12 columns</div>
        </div>
        <div>
          <div style={{ fontSize:18, fontWeight:600, color:"#1B2A4A" }}>{fmtUsdM(sumInit)}</div>
          <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>Initial Funding</div>
        </div>
        <div>
          <div style={{ fontSize:18, fontWeight:600, color:"#1B2A4A" }}>{fmtUsdM(sumCurr)}</div>
          <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>Current Balance</div>
        </div>
        <div>
          <div style={{ fontSize:18, fontWeight:600, color:"#1B2A4A" }}>{fmtUsdM(sumCMT)}</div>
          <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>Total Commitment</div>
        </div>
        <div>
          <div style={{ fontSize:18, fontWeight:600, color:"#1B2A4A" }}>{fullyFundedLTC != null ? fmtPctV(fullyFundedLTC) : dash}</div>
          <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>Fully Funded LTC</div>
        </div>
      </div>

      {/* OCM Exposure + Appraised LTV side-by-side */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
        <div style={{ background:"#fff", borderRadius:6, padding:18, border:"1px solid #E2E8F0" }}>
          <div style={{ fontSize:18, fontWeight:600, color:"#475569", marginBottom:14 }}>OCM Exposure</div>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr>
                <th style={navyHead}>Fund Name <span style={{ opacity:0.5 }}>⌄</span></th>
                <th style={{...navyHead, textAlign:"right"}}>% Own.</th>
                <th style={{...navyHead, textAlign:"right"}}>Init. Funding</th>
                <th style={{...navyHead, textAlign:"right"}}>Curr. Balance</th>
                <th style={{...navyHead, textAlign:"right"}}>Total CMT</th>
              </tr>
            </thead>
            <tbody>
              {ocmRows.map((r,i) => (
                <tr key={i}>
                  <td style={cell}>{r.fund}</td>
                  <td style={cellRt}>{(r.pct*100).toFixed(0)}%</td>
                  <td style={cellRt}>{fmtUsdM(r.init)}</td>
                  <td style={cellRt}>{fmtUsdM(r.curr)}</td>
                  <td style={cellRt}>{fmtUsdM(r.cmt)}</td>
                </tr>
              ))}
              <tr style={{ background:"#1B2A4A", color:"#fff" }}>
                <td style={{...cell, color:"#fff", fontWeight:700, borderBottom:"none"}}>Grand total</td>
                <td style={{...cellRt, color:"#fff", fontWeight:700, borderBottom:"none"}}>{(ocmTotalPct*100).toFixed(0)}%</td>
                <td style={{...cellRt, color:"#fff", fontWeight:700, borderBottom:"none"}}>{fmtUsdM(sumInit)}</td>
                <td style={{...cellRt, color:"#fff", fontWeight:700, borderBottom:"none"}}>{fmtUsdM(sumCurr)}</td>
                <td style={{...cellRt, color:"#fff", fontWeight:700, borderBottom:"none"}}>{fmtUsdM(sumCMT)}</td>
              </tr>

        <div style={{ background:"#fff", borderRadius:6, padding:18, border:"1px solid #E2E8F0" }}>
          <div style={{ fontSize:18, fontWeight:600, color:"#475569", marginBottom:14 }}>Appraised LTV Summary</div>
          {ltvScenarios.length === 0 ? (
            <div style={{ padding:14, textAlign:"center", color:"#94A3B8", fontSize:11 }}>No appraisal data on file.</div>
          ) : (
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr>
                  <th style={navyHead}>Scenario <span style={{ opacity:0.5 }}>⌄</span></th>
                  <th style={{...navyHead, textAlign:"right"}}>Appraised Value</th>
                  <th style={{...navyHead, textAlign:"right"}}>Current LTV</th>
                  <th style={{...navyHead, textAlign:"right"}}>FF LTC</th>

              <tbody>
                {ltvScenarios.map((s,i) => (
                  <tr key={i}>
                    <td style={cell}>{s.scenario}</td>
                    <td style={cellRt}>{fmtUsdM(s.val)}</td>
                    <td style={cellRt}>{fmtPctV(s.currLtv)}</td>
                    <td style={cellRt}>{fmtPctV(s.ffLtc)}</td>

      {/* PRICING (kept) */}

        <div className="grid3">

          <FieldRow label="Benchmark">{loan.benchmark ? loan.benchmark + "%" : "—"}</FieldRow>
          <FieldRow label="All-In Rate">{fmt.rate(loan.currentRate)}</FieldRow>

          <FieldRow label="Exit Fee">{loan.exitFees != null ? loan.exitFees + "%" : "—"}</FieldRow>

        <div className="grid3">
          <FieldRow label="1st Extension">{loan.firstExtMonths ? loan.firstExtMonths + " mo" : "—"}</FieldRow>
          <FieldRow label="2nd Extension">{loan.secondExtMonths ? loan.secondExtMonths + " mo" : "—"}</FieldRow>
          <FieldRow label="3rd Extension">{loan.thirdExtMonths ? loan.thirdExtMonths + " mo" : "—"}</FieldRow>
        </div>

          <div style={{ marginTop:10, padding:"10px 12px", background:"#F8FAFC", borderRadius:6, fontSize:11, color:"#475569", lineHeight:1.5 }}>

          </div>
        )}
      </SectionCard>

      {/* SENIOR LENDER PARTICIPATION (kept) */}
      {seniorLenders.length > 0 && (
        <SectionCard title="Senior Lender Participation">
          <table className="tbl">
            <thead><tr><th>Lender</th><th style={{ textAlign:"right" }}>% Participation</th></tr></thead>
            <tbody>
              {seniorLenders.map((l,i) => (
                <tr key={i}><td><strong>{l.name}</strong></td><td style={{ textAlign:"right", fontWeight:600 }}>{fmt.pct(l.pct)}</td></tr>
              ))}
            </tbody>
          </table>
        </SectionCard>
      )}

      {editIdx != null && (() => {
        const p = positions[editIdx];
        const onSavePos = (vals) => {
          const changes = [];
          if (vals.lender !== p.lender) changes.push({ field:"Senior_Lender__c", label:"Lender", oldVal: String(p.lender), newVal: String(vals.lender) });
          if (Number(vals.currentBalance) !== Number(p.currentBalance)) changes.push({ field:"Current_Balance_Note_A__c", label:p.pos + " Curr. Balance", oldVal: fmt.usd(p.currentBalance), newVal: fmt.usd(Number(vals.currentBalance)) });
          if (Number(vals.totalCMT) !== Number(p.totalCMT)) changes.push({ field:"Total_CMT__c", label:p.pos + " Total CMT", oldVal: fmt.usd(p.totalCMT), newVal: fmt.usd(Number(vals.totalCMT)) });
          if (changes.length > 0) addApproval({ subType:"Field Change", loanName: loan.name, fund: loan.fund, amTeam: loan.amTeam, changes });
          setEditIdx(null);
        };
        return (
          <EditPopupModal
            title={"Edit Capital Stack — " + p.pos}
            subtitle={loan.name}
            fields={[
              { key:"pos", label:"Position", hint:"Read-only — change requires structural amendment" },
              { key:"sponsorName", label:"Sponsor Name" },
              { key:"lender", label:"Lender" },
              { key:"benchmark", label:"Benchmark" },
              { key:"spread", label:"Spread (bps over benchmark)", type:"number" },
              { key:"allInRate", label:"All-in Rate (%)", type:"number" },
              { key:"initFunding", label:"Initial Funding ($)", type:"number" },
              { key:"currentBalance", label:"Current Balance ($)", type:"number" },
              { key:"futureFunding", label:"Future Funding ($)", type:"number" },
              { key:"totalCMT", label:"Total Commitment ($)", type:"number" },
            ]}
            initialValues={p}
            onSave={onSavePos}
            onClose={()=>setEditIdx(null)}
          />
        );
      })()}
    </div>
  );
}

function LoanPropertiesTab({ loan, properties, onSelectProperty, addApproval }) {
  const [editPropId, setEditPropId] = useState(null);
  const [creating, setCreating]     = useState(false);
  const [localProps, setLocalProps] = useState(properties);

  const editProp = editPropId ? localProps.find(p => p.id === editPropId) : null;

  const propFields = [
    { key:"name",    label:"Property Name" },
    { key:"type",    label:"Property Type", type:"select", options: PROPERTY_TYPES.filter(t => t !== "All") },
    { key:"subType", label:"Subtype" },
    { key:"street",  label:"Street Address" },
    { key:"city",    label:"City" },
    { key:"state",   label:"State Code", hint:"2-letter, e.g. NY" },
    { key:"postal",  label:"Postal Code" },
    { key:"region",  label:"Region", type:"select", options:["South","East","Midwest","West","Other"] },
    { key:"ncreif",  label:"NCREIF Region", type:"select", options:["Pacific","Southeast","Northeast","Mountain","Southwest","Mideast","Various"] },
    { key:"yearBuilt", label:"Year Built", type:"number" },
    { key:"yearReno",  label:"Year Renovated", type:"number" },
    { key:"units",   label:"Units / SF", type:"number" },
    { key:"allocAmount", label:"Allocated Balance", type:"number", hint:"USD whole-dollar amount" },
    { key:"commitment",  label:"Loan Commitment", type:"number" },
  ];

  const onSaveEdit = (vals) => {
    setLocalProps(prev => prev.map(p => p.id === editProp.id ? { ...p, ...vals, units: vals.units===""?null:Number(vals.units), allocAmount: vals.allocAmount===""?null:Number(vals.allocAmount), commitment: vals.commitment===""?null:Number(vals.commitment) } : p));
    if (addApproval) {
      const changes = [];
      for (const k of Object.keys(vals)) {
        if (String(vals[k]||"") !== String(editProp[k]||"")) {
          const f = propFields.find(x => x.key===k);
          changes.push({ field: k, label: f?.label || k, oldVal: String(editProp[k]||"—"), newVal: String(vals[k]||"—") });
        }
      }
      if (changes.length > 0) addApproval({ subType:"Field Change", loanName: loan.name, fund: loan.fund, amTeam: loan.amTeam, changes });
    }
    setEditPropId(null);
  };

  const onCreate = (vals) => {
    const newProp = {
      ...vals,
      id: "PROP-NEW-" + Date.now(),
      cycleDate: loan.cycleDate,
      sfLoanId: loan.sfId,
      units: vals.units===""?null:Number(vals.units),
      allocAmount: vals.allocAmount===""?null:Number(vals.allocAmount),
      commitment: vals.commitment===""?null:Number(vals.commitment),
    };
    setLocalProps(prev => [newProp, ...prev]);
    if (addApproval) {
      addApproval({ subType:"Field Change", loanName: loan.name, fund: loan.fund, amTeam: loan.amTeam,
        changes: [{ field:"Invesco_Property__c", label:"New Property", oldVal:"—", newVal: vals.name }] });
    }
    setCreating(false);
  };

  return (
    <SectionCard
      title={"Properties (" + localProps.length + ")"}
      action={
        <button title="∑ Sigma: Insert Row Action on silver_invesco_property · Approval required · Triggers Property After-Save flow → auto-creates ESG record" onClick={()=>setCreating(true)} style={{ background:"#28A745", color:"#fff", border:"none", borderRadius:6, padding:"5px 14px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
          + New Property
        </button>
      }
    >
      {localProps.length === 0 ? (
        <div style={{ padding:24, textAlign:"center", color:"#94A3B8", fontSize:12 }}>No property records found.</div>
      ) : (
        <table className="tbl">
          <thead>
            <tr><th style={{ width:60 }}></th><th>Property</th><th>Type</th><th>Location</th><th>Region</th><th>Year</th><th style={{ textAlign:"right" }}>Units</th><th style={{ textAlign:"right" }}>Allocated</th></tr>
          </thead>
          <tbody>
            {localProps.map(p => (
              <tr key={p.id}>
                <td>
                  <button title="∑ Sigma: Edit silver_invesco_property — Update Row Action · Approval required before Gold promotion" onClick={(e)=>{ e.stopPropagation(); setEditPropId(p.id); }} style={{ background:"#E8F0FE", border:"1px solid #90CAF9", color:"#0D47A1", borderRadius:4, padding:"3px 10px", fontSize:10, fontWeight:600, cursor:"pointer" }}>✎ Edit</button>
                </td>
                <td onClick={()=>onSelectProperty(p, loan)} style={{ cursor:"pointer" }}><strong style={{ color:"#1B2A4A" }}>{p.name}</strong></td>
                <td onClick={()=>onSelectProperty(p, loan)} style={{ fontSize:11, color:"#475569", cursor:"pointer" }}>{p.subType || p.type || "—"}</td>
                <td onClick={()=>onSelectProperty(p, loan)} style={{ fontSize:11, color:"#475569", cursor:"pointer" }}>{[p.city, p.state].filter(Boolean).join(", ") || "—"}</td>
                <td onClick={()=>onSelectProperty(p, loan)} style={{ fontSize:11, color:"#475569", cursor:"pointer" }}>{p.region || p.ncreif || "—"}</td>
                <td onClick={()=>onSelectProperty(p, loan)} style={{ fontSize:11, color:"#475569", cursor:"pointer" }}>{p.yearBuilt}{p.yearReno ? " · reno " + p.yearReno : ""}</td>
                <td onClick={()=>onSelectProperty(p, loan)} style={{ textAlign:"right", fontSize:11, cursor:"pointer" }}>{fmt.num(p.units)}</td>
                <td onClick={()=>onSelectProperty(p, loan)} style={{ textAlign:"right", fontWeight:700, cursor:"pointer" }}>{fmt.usd(p.allocAmount)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {editProp && (
        <EditPopupModal
          title={"Edit Property — " + editProp.name}
          subtitle={loan.name + " · " + editProp.id}
          fields={propFields}
          initialValues={editProp}
          onSave={onSaveEdit}
          onClose={()=>setEditPropId(null)}
        />
      )}
      {creating && (
        <EditPopupModal
          title="New Property"
          subtitle={"Add to " + loan.name}
          fields={propFields}
          initialValues={{}}
          onSave={onCreate}
          onClose={()=>setCreating(false)}
          primaryLabel="Create"
        />
      )}
    </SectionCard>
  );
}

function LoanModsTab({ loan, mods, addApproval }) {
  const [editId, setEditId]     = useState(null);
  const [creating, setCreating] = useState(false);
  const [localMods, setLocalMods] = useState(mods);
  const editMod = editId ? localMods.find(m => m.id === editId) : null;

  const modFields = [
    { key:"typeOfMod",       label:"Type of Mod",       type:"select", options: MOD_TYPES },
    { key:"type",            label:"Major / Minor",     type:"select", options:["Major","Minor"] },
    { key:"pendingExecuted", label:"Status",            type:"select", options:["Pending","Executed","Paid Off"] },
    { key:"creditAssetStatus", label:"Asset Status",    type:"select", options:["Drafted","Finalized"] },
    { key:"dateExecuted",    label:"Date Executed",     type:"date" },
    { key:"currentMaturity", label:"Current Maturity",  type:"date" },
    { key:"finalMaturity",   label:"Final Maturity",    type:"date" },
    { key:"icApproval",      label:"IC Approval Notes" },
    { key:"statusText",      label:"Status Notes",      type:"textarea", rows:4 },
  ];

  const onSaveMod = (vals) => {
    const changes = [];
    for (const k of Object.keys(vals)) {
      if (vals[k] !== editMod[k] && vals[k] !== "") {
        const labels = { typeOfMod:"Type of Mod", type:"Major/Minor", pendingExecuted:"Status", creditAssetStatus:"Asset Status", currentMaturity:"Current Maturity", finalMaturity:"Final Maturity", dateExecuted:"Date Executed", icApproval:"IC Approval", statusText:"Status Notes" };
        if (labels[k]) changes.push({ field:k, label:labels[k], oldVal: String(editMod[k]||"—"), newVal: String(vals[k]) });
      }
    }
    setLocalMods(prev => prev.map(m => m.id === editMod.id ? { ...m, ...vals } : m));
    if (changes.length > 0) {
      addApproval({ subType:"Field Change", loanName: loan.name, fund: loan.fund, amTeam: loan.amTeam, changes });
    }
    setEditId(null);
  };

  const onCreateMod = (vals) => {
    const newMod = {
      ...vals,
      id: "MOD-NEW-" + Date.now(),
      name: "II-NEW-" + Math.floor(Math.random() * 999),
      loanName: loan.name,
      fund: loan.fund,
      createdDate: new Date().toISOString(),
      lastModified: new Date().toISOString(),
    };
    setLocalMods(prev => [newMod, ...prev]);
    addApproval({
      subType: "Field Change",
      loanName: loan.name,
      fund: loan.fund,
      amTeam: loan.amTeam,
      changes: [{ field:"Loan_Modification__c", label:"New Modification", oldVal:"—", newVal: (vals.typeOfMod || "Modification") + " (" + (vals.type || "—") + ")" }],
    });
    setCreating(false);
  };

  return (
    <SectionCard
      title={"Loan Modifications (" + localMods.length + ")"}
      action={
        <button onClick={()=>setCreating(true)} title="∑ Sigma: Insert Row Action on silver_loan_modifications · Approval required" style={{ background:"#28A745", color:"#fff", border:"none", borderRadius:6, padding:"5px 14px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
          + New Modification
        </button>
      }
    >
      {localMods.length === 0 ? (
        <div style={{ padding:24, textAlign:"center", color:"#94A3B8", fontSize:12 }}>No modifications recorded for this loan.</div>
      ) : (
        <table className="tbl">
          <thead>
            <tr>
              <th style={{ width:60 }}></th>
              <th>Type of Mod</th>
              <th>Major/Minor</th>
              <th>Status</th>
              <th>Asset Status</th>
              <th>Date Executed</th>
              <th>Current Maturity</th>
              <th>Final Maturity</th>
              <th>IC Approval</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            {localMods.map(m => (
              <tr key={m.id}>
                <td>
                  <button title="∑ Sigma: Open edit modal on silver_loan_modifications — Update Row Action · Submits Field Change approval on save" onClick={()=>setEditId(m.id)} style={{ background:"#E8F0FE", border:"1px solid #90CAF9", color:"#0D47A1", borderRadius:4, padding:"3px 10px", fontSize:10, fontWeight:600, cursor:"pointer" }}>✎ Edit</button>
                </td>
                <td><strong style={{ color:"#1B2A4A", fontSize:11 }}>{m.typeOfMod}</strong></td>
                <td><span style={{ background: m.type==="Major"?"#FEE2E2":"#FEF3C7", color: m.type==="Major"?"#991B1B":"#92400E", padding:"2px 8px", borderRadius:4, fontSize:10, fontWeight:700 }}>{m.type}</span></td>
                <td><span style={{ background: m.pendingExecuted==="Executed"?"#D4EDDA":m.pendingExecuted==="Pending"?"#FFF3CD":"#E0E7FF", color: m.pendingExecuted==="Executed"?"#155724":m.pendingExecuted==="Pending"?"#856404":"#3730A3", padding:"2px 8px", borderRadius:4, fontSize:10, fontWeight:700 }}>{m.pendingExecuted}</span></td>
                <td style={{ fontSize:11, color:"#475569" }}>{m.creditAssetStatus || "—"}</td>
                <td style={{ fontSize:11, color:"#475569" }}>{fmt.date(m.dateExecuted)}</td>
                <td style={{ fontSize:11, color:"#475569" }}>{fmt.date(m.currentMaturity)}</td>
                <td style={{ fontSize:11, color:"#475569" }}>{fmt.date(m.finalMaturity)}</td>
                <td style={{ fontSize:10, color:"#1E40AF", maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={m.icApproval}>{m.icApproval || "—"}</td>
                <td style={{ fontSize:10, color:"#475569", maxWidth:240, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={m.statusText}>{m.statusText || "—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {editMod && (
        <EditPopupModal
          title={"Edit Modification — " + editMod.typeOfMod}
          subtitle={loan.name + " · " + editMod.id}
          fields={modFields}
          initialValues={editMod}
          onSave={onSaveMod}
          onClose={()=>setEditId(null)}
        />
      )}
      {creating && (
        <EditPopupModal
          title="New Modification"
          subtitle={"Add to " + loan.name}
          fields={modFields}
          initialValues={{}}
          onSave={onCreateMod}
          onClose={()=>setCreating(false)}
          primaryLabel="Create"
        />
      )}
    </SectionCard>
  );
}

function LoanApprovalsTab({ loan, approvals, role, currentUserName, setApprovals }) {
  const [rejectFor, setRejectFor] = useState(null);
  const [reason, setReason]       = useState("");

  if (approvals.length === 0) {
    return <SectionCard title="Approval History"><div style={{ padding:24, textAlign:"center", color:"#94A3B8", fontSize:12 }}>No approval activity for this loan.</div></SectionCard>;
  }

  const canActOn = (a) => {
    if (a.status !== "pending") return false;
    if (role === "admin") return true;
    if (role === "deallead" && a.approver === currentUserName) return true;
    return false;
  };
  const decide = (id, decision, rejectReason) => {
    setApprovals(prev => prev.map(a => a.id===id ? { ...a, status: decision, decidedAt: fmtDateTime(new Date()), decidedBy: currentUserName, rejectReason: rejectReason || a.rejectReason } : a));
    setRejectFor(null); setReason("");
  };

  const pendingCount = approvals.filter(a => canActOn(a)).length;

  return (
    <SectionCard
      title={"Approval Activity (" + approvals.length + ")"}
      action={pendingCount > 0 ? <span style={{ background:"#FFF3CD", color:"#856404", padding:"3px 10px", borderRadius:4, fontSize:10, fontWeight:700 }}>⏳ {pendingCount} actionable</span> : null}
    >
      <table className="tbl">
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>When</th>
            <th>Submitter</th>
            <th>Approver</th>
            <th>Change Summary</th>
            <th>Status</th>
            <th style={{ width: 200 }}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {approvals.map(a => {
            const actionable = canActOn(a);
            const isRejectingThis = rejectFor === a.id;
            return (
              <tr key={a.id} style={actionable ? { background:"#FFFBEB" } : undefined}>
                <td style={{ fontFamily:"monospace", fontSize:10 }}>{a.id}</td>
                <td><span style={{ background:a.subType==="Field Change"?"#CFFAFE":"#F3E8FF", color:a.subType==="Field Change"?"#0E7490":"#6B21A8", padding:"1px 6px", borderRadius:3, fontSize:10, fontWeight:700 }}>{a.subType}</span></td>
                <td style={{ fontSize:11, color:"#475569" }}>{a.submittedAt}</td>
                <td style={{ fontSize:11, color:"#475569" }}>{a.submitter}</td>
                <td style={{ fontSize:11 }}><ApproverChip approver={a.approver} isFallback={a.approverFallback} amTeam={a.amTeam} /></td>
                <td style={{ fontSize:11, color:"#475569", maxWidth:280 }}>
                  {a.changes ? (
                    <span>{a.changes.map(c => c.label).join(", ")}</span>
                  ) : a.onboarding ? (
                    <span>Onboarding ({a.onboarding.recordType})</span>
                  ) : "—"}
                </td>
                <td><StatusBadge status={a.status} /></td>
                <td>
                  {actionable && !isRejectingThis && (
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={()=>decide(a.id, "approved")} title="∑ Sigma: Update Row Action on silver_approvals · Sets status=approved, decided_at, decided_by · Element-level security" style={{ background:"#28A745", color:"#fff", border:"none", borderRadius:4, padding:"3px 10px", fontSize:10, fontWeight:700, cursor:"pointer" }}>Approve</button>
                      <button onClick={()=>{ setRejectFor(a.id); setReason(""); }} title="∑ Sigma: Update Row Action on silver_approvals · Sets status=rejected · Notifies submitter" style={{ background:"#fff", color:"#C62828", border:"1px solid #F8D7DA", borderRadius:4, padding:"3px 10px", fontSize:10, fontWeight:600, cursor:"pointer" }}>Reject</button>
                    </div>
                  )}
                  {actionable && isRejectingThis && (
                    <div style={{ display:"flex", gap:4 }}>
                      <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="Reason..." autoFocus style={{ flex:1, border:"1px solid #ddd", borderRadius:4, padding:"3px 6px", fontSize:10 }} />
                      <button onClick={()=>decide(a.id, "rejected", reason || "Rejected")} style={{ background:"#DC2626", color:"#fff", border:"none", borderRadius:4, padding:"3px 8px", fontSize:10, fontWeight:700, cursor:"pointer" }}>OK</button>
                      <button onClick={()=>setRejectFor(null)} style={{ background:"#eee", color:"#666", border:"none", borderRadius:4, padding:"3px 8px", fontSize:10, cursor:"pointer" }}>X</button>
                    </div>
                  )}
                  {!actionable && a.status === "pending" && (
                    <span style={{ fontSize:10, color:"#94A3B8" }}>Awaiting {a.approver}</span>
                  )}
                  {!actionable && a.status !== "pending" && a.decidedBy && (
                    <span style={{ fontSize:10, color:"#94A3B8" }}>by {a.decidedBy}</span>
                  )}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </SectionCard>
  );
}

        <div style={{ display:"flex", alignItems:"center", gap:14 }}>

            <div style={{ fontSize:11, color:"#1B2A4A", fontWeight:600 }}>{data.lastRun}</div>

          <button title="∑ External: Opens Bellwether AI Suite extractor · OAuth SSO · On job complete writes to silver_asset_rent_roll → gold_asset_rent_roll_book" onClick={()=>window.open("https://aisuite.bellwetherco.com/tools/extractor", "_blank")} style={{ background:"#2E75B6", color:"#fff", border:"none", borderRadius:6, padding:"7px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>+ New Job</button>

      <div style={{ display:"flex", gap:10, marginBottom:14 }}>
        <KPICard label="Total Units" value={totalUnits} />
        <KPICard label="Occupied"    value={occupied}  color="#059669" />
        <KPICard label="Vacant"      value={vacant}    color="#DC2626" />

        <KPICard label="Total In-Place Rent" value={fmt.usd(totalRent)} sub="Monthly" />

      <div className="grid2">
        <SectionCard title="Climate Risk">
          <FieldRow label="Physical Risk Score"><EditableField editing={editing} value={get("physicalRisk")} type="number" onChange={v=>set("physicalRisk",v)} /></FieldRow>
          <FieldRow label="Low-Carbon Transition Risk"><EditableField editing={editing} value={get("lowCarbonRisk")} onChange={v=>set("lowCarbonRisk",v)} /></FieldRow>
          {e.climateRisks && (
            <div style={{ marginTop:10, padding:"8px 10px", background:"#FEF3C7", borderRadius:4, fontSize:11, color:"#92400E" }}>
              <div style={{ fontWeight:700, marginBottom:4 }}>Identified Risks:</div>
              {e.climateRisks}
            </div>
          )}
        </SectionCard>

        <SectionCard title="Goals & Achievements">
          {(e.esgGoals || editing) && <FieldRow label="ESG Goals"><EditableField editing={editing} value={get("esgGoals")} onChange={v=>set("esgGoals",v)} /></FieldRow>}
          {(e.achievements || editing) && <FieldRow label="Achievements"><EditableField editing={editing} value={get("achievements")} onChange={v=>set("achievements",v)} /></FieldRow>}
          {(e.totalESG || editing) && <FieldRow label="Total ESG"><EditableField editing={editing} value={get("totalESG")} onChange={v=>set("totalESG",v)} /></FieldRow>}
        </SectionCard>
      </div>

      {!editing && (
        <div style={{ display:"flex", justifyContent:"center", marginTop:18 }}>
          <button title="∑ Sigma: Enter edit mode on silver_invesco_esg · Changes staged in approvals table · Submitted to AM Team Deal Lead" onClick={()=>setEditing(true)} style={{ background:"#2E75B6", color:"#fff", border:"none", borderRadius:6, padding:"10px 28px", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
            ✎ Edit ESG
          </button>
        </div>
      )}
      {editing && <EditModeBar section="ESG" onSave={save} onCancel={cancel} />}
    </div>
  );
}

function PropOperatingTab({ property }) {
  const [editing, setEditing] = useState(false);
  const [edits, setEdits] = useState({ noi:"", revenues:"", expenses:"", capRate:"", occupancy:"" });
  const [toast, setToast] = useState(null);
  const cancel = () => { setEdits({ noi:"", revenues:"", expenses:"", capRate:"", occupancy:"" }); setEditing(false); };
  const save = () => {
    setToast({ type:"ok", msg:"Operating performance staged · pending Deal Lead approval" });
    cancel();
    setTimeout(()=>setToast(null), 4000);
  };
  const set = (k,v) => setEdits(prev => ({...prev, [k]:v}));

  return (
    <div style={editing ? { paddingBottom:80 } : undefined}>
      <SaveToast show={!!toast} type={toast?.type} msg={toast?.msg} />
      <SectionCard title="Operating Performance">
        {!editing && (
          <div style={{ padding:18, textAlign:"center", color:"#94A3B8", fontSize:12, lineHeight:1.6 }}>
            Property-level operating financials would render from <span style={{ fontFamily:"monospace", color:"#0E7490" }}>silver_invesco_property_operating</span>. Click <strong>Edit</strong> below to enter a manual override or initial values.
          </div>
        )}
        {editing && (
          <div className="grid2">
            <FieldRow label="NOI (TTM)"><EditableField editing={true} value={edits.noi} type="number" onChange={v=>set("noi",v)} /></FieldRow>
            <FieldRow label="Revenues (TTM)"><EditableField editing={true} value={edits.revenues} type="number" onChange={v=>set("revenues",v)} /></FieldRow>
            <FieldRow label="Operating Expenses (TTM)"><EditableField editing={true} value={edits.expenses} type="number" onChange={v=>set("expenses",v)} /></FieldRow>
            <FieldRow label="Implied Cap Rate (%)"><EditableField editing={true} value={edits.capRate} type="number" onChange={v=>set("capRate",v)} /></FieldRow>
            <FieldRow label="Occupancy (%)"><EditableField editing={true} value={edits.occupancy} type="number" onChange={v=>set("occupancy",v)} /></FieldRow>
          </div>
        )}
      </SectionCard>
      {!editing && (
        <div style={{ display:"flex", justifyContent:"center", marginTop:18 }}>
          <button title="∑ Sigma: Enter edit mode on silver_invesco_property_operating · Changes staged in approvals table · Submitted to AM Team Deal Lead" onClick={()=>setEditing(true)} style={{ background:"#2E75B6", color:"#fff", border:"none", borderRadius:6, padding:"10px 28px", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
            ✎ Edit Operating Performance
          </button>
        </div>
      )}
      {editing && <EditModeBar section="Operating Performance" onSave={save} onCancel={cancel} />}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [currentRole, setCurrentRole] = useState("analyst");
  const [screen,      setScreen]      = useState("portfolio");
  const [selectedLoan,    setSelectedLoan]    = useState(null);
  const [selectedProperty,setSelectedProperty]= useState(null);
  const [navStack,    setNavStack]    = useState(["portfolio"]);
  const [approvals,   setApprovals]   = useState(buildMockApprovals());
  const [showApprovalsPanel, setShowApprovalsPanel] = useState(false);
  const [showSigmaBuild,     setShowSigmaBuild]     = useState(false);
  const [onboardingDraft,    setOnboardingDraft]    = useState(null);
  const [showNewLoan,        setShowNewLoan]        = useState(false);
  const [createdLoans,       setCreatedLoans]       = useState([]); // new loans created this session
  const [toast, setToast] = useState(null);

  const userNameByRole = { analyst:"Emily Leon", deallead:"Ariel Cole", admin:"System Admin" };
  const currentUserName = userNameByRole[currentRole];

  useEffect(() => { if (toast) { const t = setTimeout(()=>setToast(null), 4500); return ()=>clearTimeout(t); } }, [toast]);

  const navigateTo = (s, payload) => {
    setScreen(s);
    if (s === "loan")     setSelectedLoan(payload);
    if (s === "property") setSelectedProperty(payload);
    setNavStack(prev => {
      const idx = prev.indexOf(s);
      if (idx !== -1) return prev.slice(0, idx + 1);
      return [...prev, s];
    });
  };

  const goBack = () => {
    if (navStack.length <= 1) { setScreen("portfolio"); setNavStack(["portfolio"]); return; }
    const next = navStack.slice(0, -1);
    setNavStack(next);
    setScreen(next[next.length-1]);
  };

  const goHome = () => { setScreen("portfolio"); setNavStack(["portfolio"]); setSelectedLoan(null); setSelectedProperty(null); };

  const navigateToCrumb = (idx) => {
    const dest = navStack[idx];
    setNavStack(navStack.slice(0, idx + 1));
    setScreen(dest);
  };

  const addApproval = ({ subType, loanName, fund, amTeam, changes, onboarding }) => {
    const isSelfUpdate = currentRole === "deallead" && resolveApprover(amTeam).resolved === currentUserName;
    if (currentRole === "admin") {
      setApprovals(prev => [{
        id: "APR-" + String(prev.length + 1).padStart(3,"0"),
        flowSource: subType==="Onboarding"?"onboarding-screen-flow":"loan-after-save",
        subType, loanName, fund, amTeam,
        approver: resolveApprover(amTeam).resolved, approverFallback: resolveApprover(amTeam).isFallback,
        submitter: currentUserName, submitterRole: currentRole,
        submittedAt: fmtDateTime(new Date()),
        decidedAt:   fmtDateTime(new Date()),
        decidedBy:   currentUserName,
        changes, onboarding,
        status: "approved",
      }, ...prev]);
      setToast({ type:"ok", msg:"Saved (Admin override — no approval required)" });
      return;
    }
    if (isSelfUpdate && subType === "Field Change") {
      setApprovals(prev => [{
        id: "APR-" + String(prev.length + 1).padStart(3,"0"),
        flowSource: "loan-after-save",
        subType, loanName, fund, amTeam,
        approver: resolveApprover(amTeam).resolved, approverFallback: false,
        submitter: currentUserName, submitterRole: currentRole,
        submittedAt: fmtDateTime(new Date()),
        changes,
        status: "self-update-bypass",
      }, ...prev]);
      setToast({ type:"ok", msg:"Saved (Deal Lead self-update — no approval needed)" });
      return;
    }
    const ap = resolveApprover(amTeam);
    const sla = fmtDateTime(fiveBusinessDays());
    setApprovals(prev => [{
      id: "APR-" + String(prev.length + 1).padStart(3,"0"),
      flowSource: subType==="Onboarding"?"onboarding-screen-flow":"loan-after-save",
      subType, loanName, fund, amTeam,
      approver: ap.resolved, approverFallback: ap.isFallback,
      submitter: currentUserName, submitterRole: currentRole,
      submittedAt: fmtDateTime(new Date()),
      slaDueAt: sla,
      changes, onboarding,
      status: "pending",
    }, ...prev]);
    setToast({ type:"ok", msg:"Submitted to " + ap.resolved + (ap.isFallback?" (fallback)":"") + " · SLA " + fmt.date(sla) });
  };

  const triggerOnboarding = (loan) => { setOnboardingDraft(loan); };

  const createLoan = (formData) => {
    const newLoan = {
      ...formData,
      id: "NEW-" + Date.now(),
      sfId: "a2M" + Math.random().toString(36).substring(2,12).toUpperCase(),
      cycleDate: formData.cycleDate || new Date().toISOString().slice(0,10),
      currentBalance: formData.currentBalance || 0,
      numProperties: 0,
      watchlist: "None",
    };
    setCreatedLoans(prev => [newLoan, ...prev]);
    // Submit as Onboarding approval automatically
    addApproval({
      subType: "Onboarding",
      loanName: newLoan.name,
      fund: newLoan.fund,
      amTeam: newLoan.amTeam,
      onboarding: {
        recordType: newLoan.fund,
        cycleDate: newLoan.cycleDate,
        propertyType: newLoan.propertyType || "—",
        balance: newLoan.currentBalance,
        sponsor: newLoan.principalSponsor,
        originator: newLoan.originator,
        cmiOwnership:  formData.cmiOwnership || null,
        increfOwnership: formData.increfOwnership || null,
      },
    });
    setShowNewLoan(false);
    setToast({ type:"ok", msg: "Loan " + newLoan.name + " created · Onboarding submitted to " + resolveApprover(newLoan.amTeam).resolved });
    // Navigate to the new loan
    setSelectedLoan(newLoan);
    setScreen("loan");
    setNavStack(["portfolio","loan"]);
  };

  const submitOnboarding = (loan) => {
    addApproval({
      subType: "Onboarding",
      loanName: loan.name, fund: loan.fund, amTeam: loan.amTeam,
      onboarding: {
        recordType: loan.fund,
        cycleDate: loan.cycleDate,
        propertyType: loan.propertyType,
        balance: loan.currentBalance,
        sponsor: loan.principalSponsor,
        originator: loan.originator,
      },
    });
    setOnboardingDraft(null);
  };

  const screenLabel = ({
    portfolio: "L1: Portfolio",
    loan:      "L2: Loan — " + (selectedLoan?.name || ""),
    property:  "L3: Property — " + (selectedProperty?.name || ""),
  })[screen] || screen;

  const CRUMB_COLORS = { portfolio:"#28A745", loan:"#E67E22", property:"#9B59B6" };

  const pendingCount = approvals.filter(a => a.status === "pending").length;

  return (
    <div style={{ fontFamily:"Arial, -apple-system, sans-serif", background:"#f5f7fa", minHeight:"100vh" }}>
      <SigmaHeader
        currentRole={currentRole}
        setCurrentRole={setCurrentRole}
        screen={screenLabel}
        onBack={screen !== "portfolio" ? goBack : null}
        pendingCount={pendingCount}
        onShowApprovals={()=>setShowApprovalsPanel(true)}
        onShowSigmaBuild={()=>setShowSigmaBuild(true)}
        onHome={goHome}
      />
      {showSigmaBuild && <SigmaBuildModal onClose={()=>setShowSigmaBuild(false)} />}
      {showApprovalsPanel && (
        <ApprovalsPanel
          approvals={approvals} setApprovals={setApprovals}
          onClose={()=>setShowApprovalsPanel(false)}
          role={currentRole} currentUserName={currentUserName}
        />
      )}
      {onboardingDraft && (
        <OnboardingConfirmModal
          loan={onboardingDraft}
          onClose={()=>setOnboardingDraft(null)}
          onConfirm={()=>submitOnboarding(onboardingDraft)}
        />
      )}
      {showNewLoan && (
        <NewLoanModal
          onClose={()=>setShowNewLoan(false)}
          onSubmit={createLoan}
        />
      )}

      {navStack.length > 1 && (
        <div style={{ background:"#fff", borderBottom:"1px solid #e9ecef", padding:"6px 20px", display:"flex", alignItems:"center", gap:6, fontSize:12 }}>
          {navStack.map((s,i) => {
            const labels = {
              portfolio: "Portfolio",
              loan:      selectedLoan?.name || "Loan",
              property:  selectedProperty?.name || "Property",
            };
            const isLast = i === navStack.length - 1;
            return (
              <span key={i} style={{ display:"flex", alignItems:"center", gap:6 }}>
                {i > 0 && <span style={{ color:"#ccc" }}>›</span>}
                <span onClick={()=>!isLast && navigateToCrumb(i)} style={{ color: isLast ? CRUMB_COLORS[s] : "#2E75B6", fontWeight: isLast ? 700 : 400, cursor: isLast ? "default" : "pointer", textDecoration: isLast ? "none" : "underline" }}>
                  {labels[s]}
                </span>
              </span>
            );
          })}
        </div>
      )}

      {screen === "portfolio" && (
        <PortfolioLanding
          loans={[...createdLoans, ...INVESCO_DATA.loans]}
          onSelectLoan={l => navigateTo("loan", l)}
          role={currentRole}
          approvals={approvals}
          currentUserName={currentUserName}
          setApprovals={setApprovals}
          onOpenApprovals={()=>setShowApprovalsPanel(true)}
          onOpenNewLoan={()=>setShowNewLoan(true)}
        />
      )}
      {screen === "loan" && selectedLoan && (
        <LoanDetail
          loan={selectedLoan}
          onBack={goBack}
          onSelectProperty={(p, l) => { setSelectedProperty(p); navigateTo("property", p); }}
          role={currentRole}
          currentUserName={currentUserName}
          addApproval={addApproval}
          approvals={approvals}
          setApprovals={setApprovals}
          onTriggerOnboarding={triggerOnboarding}
        />
      )}
      {screen === "property" && selectedProperty && (
        <PropertyDetail
          property={selectedProperty}
          parentLoan={selectedLoan}
          onBack={goBack}
        />
      )}

      <SaveToast show={!!toast} type={toast?.type} msg={toast?.msg} />
    </div>
  );
}

function OnboardingConfirmModal({ loan, onClose, onConfirm }) {
  const ap = resolveApprover(loan.amTeam);
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}
         onClick={(e)=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:"#fff", borderRadius:10, width:520, maxWidth:"95vw", display:"flex", flexDirection:"column", boxShadow:"0 8px 40px rgba(0,0,0,0.22)" }}>
        <div style={{ background:"#7C3AED", padding:"14px 22px", borderRadius:"10px 10px 0 0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ color:"#fff", fontSize:14, fontWeight:700 }}>Onboarding — Confirm Submission</div>
            <div style={{ color:"#E9D5FF", fontSize:11, marginTop:2 }}>Step 3 of Invesco Onboarding Approval Screen Flow</div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#fff", cursor:"pointer", fontSize:20 }}>×</button>
        </div>
        <div style={{ padding:24 }}>
          <div style={{ fontSize:12, color:"#475569", marginBottom:14 }}>Per the flow doc: confirmation screen before submission to <span className="flow-tag">Invesco_Loan_Approval_Process</span>.</div>
          <FieldRow label="Loan Name">{loan.name}</FieldRow>
          <FieldRow label="Fund (Record Type)"><FundChip fund={loan.fund} /></FieldRow>
          <FieldRow label="AM Team">{loan.amTeam || "—"}</FieldRow>
          <FieldRow label="Resolved Approver">
            <ApproverChip approver={ap.resolved} isFallback={ap.isFallback} amTeam={loan.amTeam} />
          </FieldRow>
          <div style={{ marginTop:14, padding:"10px 12px", background:"#F8FAFC", borderRadius:6, fontSize:11, color:"#475569", border:"1px solid #E2E8F0" }}>
            On confirm: submits to <strong>Invesco_Loan_Approval_Process</strong> and emails <strong>{ap.resolved}</strong>: "Deal Lead approval needed. Please approve within 5 BD of receipt."
          </div>
        </div>
        <div style={{ padding:"12px 20px", borderTop:"1px solid #e9ecef", display:"flex", gap:8, justifyContent:"flex-end" }}>
          <button onClick={onClose} style={{ background:"#f8f9fa", border:"1px solid #ddd", borderRadius:6, padding:"8px 20px", cursor:"pointer", fontSize:12 }}>Cancel</button>
          <button title="∑ Sigma: Submit to Invesco_Loan_Approval_Process · Insert silver_approvals row · Email approver per template" onClick={onConfirm} style={{ background:"#7C3AED", color:"#fff", border:"none", borderRadius:6, padding:"8px 24px", cursor:"pointer", fontSize:12, fontWeight:700 }}>Confirm & Submit</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
