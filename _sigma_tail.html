<button class="sigma-fab" id="sigmaFab" aria-label="Open Bellwether AI chat" title="Bellwether AI">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 5.5C4 4.67 4.67 4 5.5 4h13c.83 0 1.5.67 1.5 1.5v9c0 .83-.67 1.5-1.5 1.5H10l-4 4v-4H5.5c-.83 0-1.5-.67-1.5-1.5v-9z"
          fill="#fff" opacity=".95"/>
    <path d="M9.2 7.6l1 2.2 2.2 1-2.2 1-1 2.2-1-2.2-2.2-1 2.2-1 1-2.2zM15 9l.6 1.3 1.4.7-1.4.7L15 13l-.6-1.3-1.4-.7 1.4-.7L15 9z"
          fill="#0066AF"/>
  </svg>
  <span class="sigma-fab-pulse"></span>
</button>

<div class="sigma-panel" id="sigmaPanel" role="dialog" aria-label="Bellwether AI assistant">
  <div class="sigma-head">
    <div class="sigma-head-row">
      <div class="sigma-head-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9.2 6l1.2 2.6L13 9.8l-2.6 1.2L9.2 13.6 8 11l-2.6-1.2L8 8.6 9.2 6zM16 11l.7 1.5 1.5.7-1.5.7L16 15.4l-.7-1.5-1.5-.7 1.5-.7L16 11z"
                fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="sigma-head-title">Bellwether AI</div>
        <div class="sigma-head-sub">Ask anything about this portal</div>
      </div>
      <button class="sigma-close" id="sigmaClose" aria-label="Close">&times;</button>
    </div>
  </div>

  <div class="sigma-body" id="sigmaBody">
    <div class="sigma-intro">
      Hi Emily &mdash; I&rsquo;m <b>Bellwether AI</b>. I can pull from your portfolios,
      assets, covenants, deliverables, and the underlying data lake. Try one of
      these to get started:
    </div>
    <div class="sigma-section">Suggested prompts</div>
    <div class="sigma-chips">
      <button class="sigma-chip" data-prompt="What changed in my portfolio this quarter?">
        <span class="sigma-chip-eye">Portfolio</span>
        What changed in my portfolio this quarter?
      </button>
      <button class="sigma-chip" data-prompt="Which covenants are at risk in the next 60 days?">
        <span class="sigma-chip-eye">Servicing</span>
        Which covenants are at risk in the next 60 days?
      </button>
      <button class="sigma-chip" data-prompt="Compare appraisal vs. model valuation across my equity assets.">
        <span class="sigma-chip-eye">Valuation</span>
        Compare appraisal vs. model valuation across my equity assets.
      </button>
      <button class="sigma-chip" data-prompt="Summarize the Q1 2026 Flash &amp; Dash for 333 W Wacker.">
        <span class="sigma-chip-eye">Deliverables</span>
        Summarize the Q1 2026 Flash &amp; Dash for 333 W Wacker.
      </button>
    </div>
    <div class="sigma-msgs" id="sigmaMsgs"></div>
  </div>

  <div class="sigma-foot">
    <input class="sigma-input" id="sigmaInput" type="text" placeholder="Ask Bellwether AI about your portal&hellip;" />
    <button class="sigma-send" id="sigmaSend" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 12L21 4l-3 8 3 8L3 12z" fill="currentColor"/>
      </svg>
    </button>
  </div>
  <div class="sigma-disclaimer">Demo &middot; queries the catalog with row-level tenant filters.</div>
</div>

<script>
(function(){
  var fab    = document.getElementById('sigmaFab');
  var panel  = document.getElementById('sigmaPanel');
  var close  = document.getElementById('sigmaClose');
  var input  = document.getElementById('sigmaInput');
  var send   = document.getElementById('sigmaSend');
  var msgs   = document.getElementById('sigmaMsgs');
  if(!fab||!panel) return;

  function open(){ panel.classList.add('open'); setTimeout(function(){input&&input.focus();}, 60); }
  function shut(){ panel.classList.remove('open'); }
  fab.addEventListener('click', function(){
    panel.classList.contains('open') ? shut() : open();
  });
  close && close.addEventListener('click', shut);

  document.querySelectorAll('.sigma-chip').forEach(function(c){
    c.addEventListener('click', function(){
      var p = c.getAttribute('data-prompt') || c.textContent.trim();
      input.value = p;
      input.focus();
    });
  });

  function addMsg(text, who){
    var d = document.createElement('div');
    d.className = 'sigma-msg ' + (who === 'u' ? 'u' : 'b');
    d.textContent = text;
    msgs.appendChild(d);
    msgs.parentElement.scrollTop = msgs.parentElement.scrollHeight;
    return d;
  }
  function submit(){
    var v = (input.value || '').trim();
    if(!v) return;
    addMsg(v, 'u');
    input.value = '';
    var bot = addMsg('Bellwether AI is thinking…', 'b');
    setTimeout(function(){
      bot.innerHTML = '<em>Demo response &mdash; in production this would query the Bellwether catalog and return a sourced answer with links to the underlying records.</em>';
    }, 700);
  }
  send && send.addEventListener('click', submit);
  input && input.addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
})();
</script>
